name: Reusable — Frontend

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      aws_region:
        required: true
        type: string
    secrets:
      role_arn:
        required: true
      s3_bucket:
        required: true
      cloudfront_distribution_id:
        required: true
      vite_api_url:
        required: true
      vite_cognito_user_pool_id:
        required: true
      vite_cognito_client_id:
        required: true
      vite_cognito_hosted_ui_domain:
        required: true
      vite_cognito_redirect_uri:
        required: true

# Permissions are inherited from the caller workflow.
# The caller must grant id-token: write for OIDC to work.

jobs:
  deploy:
    name: Deploy Frontend (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: ./.github/actions/setup-aws
        with:
          role_arn: ${{ secrets.role_arn }}
          aws_region: ${{ inputs.aws_region }}

      - name: Build and deploy frontend
        uses: ./.github/actions/build-frontend
        with:
          s3_bucket: ${{ secrets.s3_bucket }}
          cloudfront_distribution_id: ${{ secrets.cloudfront_distribution_id }}
          aws_region: ${{ inputs.aws_region }}
          vite_api_url: ${{ secrets.vite_api_url }}
          vite_cognito_user_pool_id: ${{ secrets.vite_cognito_user_pool_id }}
          vite_cognito_client_id: ${{ secrets.vite_cognito_client_id }}
          vite_cognito_hosted_ui_domain: ${{ secrets.vite_cognito_hosted_ui_domain }}
          vite_cognito_redirect_uri: ${{ secrets.vite_cognito_redirect_uri }}
