name: Reusable — Terraform

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      working_directory:
        required: true
        type: string
      aws_region:
        required: true
        type: string
    secrets:
      role_arn:
        required: true

# Permissions are inherited from the caller workflow.
# The caller must grant id-token: write for OIDC to work.

jobs:
  terraform:
    name: Terraform (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: ./.github/actions/setup-aws
        with:
          role_arn: ${{ secrets.role_arn }}
          aws_region: ${{ inputs.aws_region }}

      - name: Terraform plan and apply
        uses: ./.github/actions/terraform-plan-apply
        with:
          working_directory: ${{ inputs.working_directory }}
