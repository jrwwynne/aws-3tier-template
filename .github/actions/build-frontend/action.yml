name: Build and deploy frontend
description: Installs dependencies, builds the Vite SPA, syncs to S3, and invalidates CloudFront.

inputs:
  s3_bucket:
    description: S3 bucket name to sync the build output to
    required: true
  cloudfront_distribution_id:
    description: CloudFront distribution ID to invalidate after deploy
    required: true
  aws_region:
    description: AWS region
    required: true
  vite_api_url:
    description: VITE_API_URL build-time variable
    required: true
  vite_cognito_user_pool_id:
    description: VITE_COGNITO_USER_POOL_ID build-time variable
    required: true
  vite_cognito_client_id:
    description: VITE_COGNITO_CLIENT_ID build-time variable
    required: true
  vite_cognito_hosted_ui_domain:
    description: VITE_COGNITO_HOSTED_UI_DOMAIN build-time variable
    required: true
  vite_cognito_redirect_uri:
    description: VITE_COGNITO_REDIRECT_URI build-time variable
    required: true

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      shell: bash
      working-directory: frontend
      run: npm ci

    - name: Build
      shell: bash
      working-directory: frontend
      env:
        VITE_API_URL: ${{ inputs.vite_api_url }}
        VITE_COGNITO_USER_POOL_ID: ${{ inputs.vite_cognito_user_pool_id }}
        VITE_COGNITO_CLIENT_ID: ${{ inputs.vite_cognito_client_id }}
        VITE_COGNITO_HOSTED_UI_DOMAIN: ${{ inputs.vite_cognito_hosted_ui_domain }}
        VITE_COGNITO_REDIRECT_URI: ${{ inputs.vite_cognito_redirect_uri }}
      run: npm run build

    - name: Sync to S3
      shell: bash
      run: |
        aws s3 sync frontend/dist/ "s3://${{ inputs.s3_bucket }}/" \
          --delete \
          --region "${{ inputs.aws_region }}"

    - name: Invalidate CloudFront
      shell: bash
      run: |
        aws cloudfront create-invalidation \
          --distribution-id "${{ inputs.cloudfront_distribution_id }}" \
          --paths "/*"
